<!DOCTYPE html>
<html lang="en"><head><title>Unit Converter - NexaHub</title><link rel="stylesheet" href="style.css"></head><body>
<nav><a href="index.html" class="logo">NexaHub</a></nav>
<div class="tool-box">
    <h1>⚖️ Universal Unit Converter</h1>
    <input type="number" id="unitInput" placeholder="Enter Value">
    <select id="unitType"><option value="km-m">KM to Meters</option><option value="m-cm">Meters to Centimeters</option><option value="kg-g">KG to Grams</option></select>

</div>
<script src="script.js"></script>
</body></html>
