<!DOCTYPE html>
<html lang="en"><head><title>Text Converter - NexaHub</title><link rel="stylesheet" href="style.css"></head><body>
<nav><a href="index.html" class="logo">NexaHub</a></nav>
<div class="tool-box">
    <h1>🔤 Text Case Converter</h1>
    <textarea id="textInput" style="width:100%; height:150px; background:#0f172a; color:white; border-radius:8px; padding:10px; border:1px solid #334155;" placeholder="Type or paste text content here..."></textarea>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px;">
        <button class="tool-btn" onclick="convertText('upper')">UPPERCASE</button>
        <button class="tool-btn" onclick="convertText('lower')">lowercase</button>
        <button class="tool-btn" onclick="convertText('capital')">Capital Case</button>
    </div>
</div>
<script src="script.js"></script>
</body></html>
